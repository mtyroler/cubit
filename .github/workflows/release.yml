name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build (ad-hoc signed Release)
        run: |
          xcodebuild -scheme Cubit -configuration Release -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES

      - name: Package
        run: |
          APP="build/Build/Products/Release/Cubit.app"
          ditto -c -k --keepParent "$APP" "Cubit-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "Cubit-${GITHUB_REF_NAME}.zip" \
            --title "Cubit ${GITHUB_REF_NAME}" \
            --generate-notes
