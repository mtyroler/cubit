name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          xcodebuild -scheme Cubit -destination 'platform=macOS' -skipPackagePluginValidation build test CODE_SIGNING_ALLOWED=NO
