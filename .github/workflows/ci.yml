name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build and test
        run: |
          xcodebuild -scheme Cubit -destination 'platform=macOS' -skipPackagePluginValidation build test CODE_SIGNING_ALLOWED=NO

  cli-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build and test the cubit CLI (SwiftPM)
        run: |
          swift build
          swift test

      # Release ships universal binaries; build them here too so a tag never fails first.
      - name: Build the agent binaries universal (release parity)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)"
          for tool in cubit cubit-mcp; do
            archs="$(lipo -archs "$BIN/$tool")"
            echo "$tool: $archs"
            case "$archs" in
              *arm64*) ;; *) echo "::error::$tool is missing arm64"; exit 1 ;;
            esac
            case "$archs" in
              *x86_64*) ;; *) echo "::error::$tool is missing x86_64"; exit 1 ;;
            esac
          done

  package-app:
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build (ad-hoc signed Release)
        run: |
          xcodebuild -scheme Cubit -configuration Release -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES

      - name: Package
        run: |
          ditto -c -k --keepParent "build/Build/Products/Release/Cubit.app" "Cubit-pr.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cubit-pr-${{ github.event.pull_request.number }}
          path: Cubit-pr.zip
          retention-days: 14
